project_name: vaultless

builds:
  - main: ./cmd/vaultless
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}-{{ .Os }}-{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

signs:
  - cmd: cosign
    artifacts: checksum
    output: true
    args:
      - "sign-blob"
      - "--yes"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"

docker_signs:
  - cmd: cosign
    artifacts: all
    output: true
    args:
      - "sign"
      - "--yes"
      - "${artifact}"

sboms:
  - artifacts: archive

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
  groups:
    - title: Security
      regexp: "^.*security.*$"
      order: 0
    - title: Features
      regexp: "^.*feat.*$"
      order: 1
    - title: Bug Fixes
      regexp: "^.*fix.*$"
      order: 2
    - title: Others
      order: 999

release:
  github:
    owner: vaultless
    name: vaultless
  prerelease: auto
  header: |
    ## Vaultless {{ .Tag }}

    Secure, local-first secrets management for developers.

    ### Verifying signatures

    ```sh
    cosign verify-blob \
      --certificate checksums.txt.pem \
      --signature checksums.txt.sig \
      --certificate-identity-regexp=".*" \
      --certificate-oidc-issuer-regexp=".*" \
      checksums.txt
    ```

brews:
  - repository:
      owner: vaultless
      name: homebrew-tap
    homepage: "https://github.com/vaultless/vaultless"
    description: "Zero-dependency secrets management for developers"

dockers:
  - image_templates:
      - "ghcr.io/vaultless/vaultless:{{ .Tag }}"
      - "ghcr.io/vaultless/vaultless:latest"
    dockerfile: Dockerfile
